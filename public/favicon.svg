<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Die face with gradient and shadow -->
  <defs>
    <linearGradient id="dieGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f3f4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000040"/>
    </filter>
  </defs>
  
  <!-- Die face -->
  <rect x="3" y="3" width="26" height="26" rx="4" ry="4" 
        fill="url(#dieGradient)" stroke="#2c3e50" stroke-width="1.5" 
        filter="url(#shadow)"/>
  
  <!-- Die dots (showing 5) -->
  <!-- Top left dot -->
  <circle cx="10" cy="10" r="2" fill="#2c3e50"/>
  <!-- Top right dot -->
  <circle cx="22" cy="10" r="2" fill="#2c3e50"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#e74c3c"/>
  <!-- Bottom left dot -->
  <circle cx="10" cy="22" r="2" fill="#2c3e50"/>
  <!-- Bottom right dot -->
  <circle cx="22" cy="22" r="2" fill="#2c3e50"/>
</svg>